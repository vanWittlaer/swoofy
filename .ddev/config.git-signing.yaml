#ddev-generated
# .ddev/config.git-signing.yaml
# SSH commit signing + single-key host auth for the DDEV web container.
# Companion to the ddev-claude-code add-on (lets in-container git commit & push
# as you, with verified signatures).
#
# COMMITTED logic only -- no personal data, and INERT until you set
# GIT_SIGNING_KEY. Put your personal values in a gitignored companion file
# (e.g. config.git-signing.local.yaml) or any DDEV web_environment / .ddev/.env:
#
#   GIT_AUTHOR_NAME  / GIT_COMMITTER_NAME    commit identity (git reads natively)
#   GIT_AUTHOR_EMAIL / GIT_COMMITTER_EMAIL   commit email (must be verified on the host)
#   GIT_SIGNING_KEY                          your SSH *public* key, one line   [REQUIRED to activate]
#   GIT_SIGNING_HOST                         git host to pin & sign for        [optional, default github.com]
#   GIT_SIGNING_KEY_FILE                     host path of the key, for the hint message only  [optional]
#
# Works with any SSH-signing host (github.com, gitlab.com, bitbucket.org, ...).
# Note: the "Verified" badge depends on the host supporting SSH signature
# verification and the commit email being verified on your account there.
#
# The SSH *private* key is never stored here. Forward it from the host with
# `ddev auth ssh -f <path>` (re-run after each host login or `ddev poweroff`).
hooks:
    post-start:
        -   exec: |
                set -eu
                if [ -z "${GIT_SIGNING_KEY:-}" ]; then
                  echo "git-signing: GIT_SIGNING_KEY unset -- inactive (set it to enable)"
                  exit 0
                fi
                HOST="${GIT_SIGNING_HOST:-github.com}"
                # Keep only "<type> <base64>" -- drop any trailing comment.
                KEY=$(printf '%s\n' "${GIT_SIGNING_KEY}" | awk '{print $1, $2}')
                EMAIL="${GIT_COMMITTER_EMAIL:-${GIT_AUTHOR_EMAIL:-}}"
                NAME="${GIT_COMMITTER_NAME:-${GIT_AUTHOR_NAME:-}}"
                mkdir -p "${HOME}/.config/git"
                printf '%s\n' "${KEY}" > "${HOME}/.config/git/signing_key.pub"
                printf '%s %s\n' "${EMAIL}" "${KEY}" > "${HOME}/.config/git/allowed_signers"
                git config --global gpg.format ssh
                git config --global user.signingkey "${HOME}/.config/git/signing_key.pub"
                git config --global commit.gpgsign true
                git config --global tag.gpgsign true
                git config --global gpg.ssh.allowedSignersFile "${HOME}/.config/git/allowed_signers"
                # Mirror the env-var identity into git config too. Git uses the
                # GIT_AUTHOR_*/GIT_COMMITTER_* env vars natively for commits, but tooling
                # that reads `git config user.name/user.email` (and a cleaner `git config`
                # for the user) should see the same identity instead of the container default.
                if [ -n "${NAME}" ]; then git config --global user.name "${NAME}"; fi
                if [ -n "${EMAIL}" ]; then git config --global user.email "${EMAIL}"; fi
                echo "git-signing: SSH commit signing configured for ${EMAIL}"
                # Offer ONLY this key to ${HOST} over SSH. DDEV's ssh-agent is shared
                # across all projects and may carry many keys; IdentitiesOnly + the
                # public key file restrict ssh to the matching agent identity, avoiding
                # "Too many authentication failures". No private key is stored here.
                mkdir -p "${HOME}/.ssh/config.d"
                cat > "${HOME}/.ssh/config.d/ddev-git-signing.conf" <<EOF
                Host ${HOST}
                    IdentityFile ${HOME}/.config/git/signing_key.pub
                    IdentitiesOnly yes
                EOF
                chmod 600 "${HOME}/.ssh/config.d/ddev-git-signing.conf"
                echo "git-signing: ssh pinned to one key for ${HOST}"
                # Friendlier failure: after `ddev poweroff`/reboot the forwarded agent
                # is empty, so ssh tries the *public* key as a private key and prints a
                # confusing "UNPROTECTED PRIVATE KEY" wall. Wrap git's ssh so an op to
                # the signing host without the key loaded fails fast with the remedy.
                # The wrapper reads GIT_SIGNING_HOST / GIT_SIGNING_KEY_FILE from the
                # environment at runtime, so this heredoc stays literal.
                cat > "${HOME}/.config/git/ssh-with-hint" <<'WRAP'
                #!/bin/sh
                HOST="${GIT_SIGNING_HOST:-github.com}"
                case " $* " in
                  *"$HOST"*)
                    FP=$(ssh-keygen -lf "$HOME/.config/git/signing_key.pub" 2>/dev/null | awk '{print $2}')
                    if [ -n "$FP" ] && ! ssh-add -l 2>/dev/null | grep -qF "$FP"; then
                      KEYFILE="${GIT_SIGNING_KEY_FILE:-~/.ssh/<your-key>}"
                      printf '\n  \033[1;33m⚠  Your signing key is not in the DDEV ssh-agent (needed for %s).\033[0m\n' "$HOST" >&2
                      printf '     It is cleared by `ddev poweroff` or a host reboot.\n\n' >&2
                      printf '     Run this on your HOST (not inside the container):\n' >&2
                      printf '         \033[1mddev auth ssh -f %s\033[0m\n\n' "$KEYFILE" >&2
                      exit 255
                    fi
                    ;;
                esac
                exec ssh "$@"
                WRAP
                chmod +x "${HOME}/.config/git/ssh-with-hint"
                git config --global core.sshCommand "${HOME}/.config/git/ssh-with-hint"
                echo "git-signing: friendlier ssh hint installed for ${HOST}"
