name: CI/CD

on:
  push:
    branches:
      - main
      - develop
      - 'feature/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

# Least-privilege default token scope; the build jobs widen to packages:write below
# (a called reusable workflow's token can't exceed the caller job's grant).
permissions:
  contents: read

jobs:
  build_staging:
    if: github.ref == 'refs/heads/develop' || startsWith(github.ref, 'refs/heads/feature')
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-docker.yml
    with:
      environment: stage
    secrets:
      BEARER_PACKAGES_SHOPWARE: ${{ secrets.BEARER_PACKAGES_SHOPWARE }}

  build_production:
    if: github.ref == 'refs/heads/main'
    permissions:
      contents: read
      packages: write
    uses: ./.github/workflows/build-docker.yml
    with:
      environment: prod
    secrets:
      BEARER_PACKAGES_SHOPWARE: ${{ secrets.BEARER_PACKAGES_SHOPWARE }}

  deploy_staging:
    if: github.ref == 'refs/heads/develop'
    needs: build_staging
    uses: ./.github/workflows/deploy-coolify.yml
    with:
      environment: stage
    secrets:
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}

  deploy_production:
    if: github.ref == 'refs/heads/main'
    needs: build_production
    uses: ./.github/workflows/deploy-coolify.yml
    with:
      environment: prod
    secrets:
      COOLIFY_API_TOKEN: ${{ secrets.COOLIFY_API_TOKEN }}