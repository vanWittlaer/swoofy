name: infra

# OpenTofu for infra/ — plan on PRs, gated apply via manual dispatch. DRAFT: dormant until you
# complete the setup below (it references secrets + an S3 backend that don't exist yet).
#
# SETUP before enabling:
#   1. infra/versions.tf — switch `backend "local"` to the Hetzner `backend "s3"` block (STATE.md),
#      add the `encryption {}` block (pbkdf2 / var.state_passphrase) and `variable "state_passphrase"`.
#   2. Create the state bucket, then run `tofu init -migrate-state` ONCE locally to move + encrypt state.
#   3. Repo secrets (Settings → Secrets and variables → Actions):
#        SECRETS_AUTO_TFVARS          full contents of infra/secrets.auto.tfvars (multi-line)
#        TFSTATE_S3_ACCESS_KEY_ID     S3 key for the state bucket (Hetzner)
#        TFSTATE_S3_SECRET_ACCESS_KEY
#        TF_STATE_PASSPHRASE          the pbkdf2 passphrase (>= 16 chars)
#   4. Create a protected Environment named "production" (Settings → Environments) with required
#      reviewers — this is the approval gate on `apply`.
#
# Note: no `push` trigger on purpose — direct pushes never auto-apply infra. Apply is manual +
# gated. Plan runs on PRs; if you commit straight to a branch instead of via PR, run the "plan"
# dispatch to preview.

on:
  pull_request:
    paths: ["infra/**"]
  workflow_dispatch:
    inputs:
      action:
        description: What to run
        type: choice
        options: [plan, apply]
        default: plan

concurrency:
  group: infra-tofu # avoid overlapping runs; the S3 lockfile is the real guard
  cancel-in-progress: false

env:
  TF_IN_AUTOMATION: "1"
  AWS_ACCESS_KEY_ID: ${{ secrets.TFSTATE_S3_ACCESS_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.TFSTATE_S3_SECRET_ACCESS_KEY }}
  TF_VAR_state_passphrase: ${{ secrets.TF_STATE_PASSPHRASE }}

jobs:
  plan:
    if: github.event_name == 'pull_request' || inputs.action == 'plan'
    runs-on: ubuntu-latest
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.10.0" # >= 1.10 for S3 use_lockfile; match your local version
      - name: Write secrets.auto.tfvars
        env:
          SECRETS: ${{ secrets.SECRETS_AUTO_TFVARS }}
        run: printf '%s\n' "$SECRETS" > secrets.auto.tfvars
      - run: tofu fmt -check -recursive
      - run: tofu init -input=false
      - run: tofu validate
      - name: Plan
        run: tofu plan -input=false -no-color -lock-timeout=5m -var-file=production.tfvars -var-file=staging.tfvars | tee plan.txt
      - name: Plan summary → run summary
        if: always()
        run: |
          { echo '```'; tail -c 60000 plan.txt; echo '```'; } >> "$GITHUB_STEP_SUMMARY"
      - name: Scrub secrets
        if: always()
        run: rm -f secrets.auto.tfvars

  apply:
    if: github.event_name == 'workflow_dispatch' && inputs.action == 'apply'
    runs-on: ubuntu-latest
    environment: production # protected env → requires a reviewer to approve before this job runs
    permissions:
      contents: read
    defaults:
      run:
        working-directory: infra
    steps:
      - uses: actions/checkout@v4
      - uses: opentofu/setup-opentofu@v1
        with:
          tofu_version: "1.10.0"
      - name: Write secrets.auto.tfvars
        env:
          SECRETS: ${{ secrets.SECRETS_AUTO_TFVARS }}
        run: printf '%s\n' "$SECRETS" > secrets.auto.tfvars
      - run: tofu init -input=false
      - name: Apply
        run: tofu apply -input=false -auto-approve -lock-timeout=5m -var-file=production.tfvars -var-file=staging.tfvars
      - name: Scrub secrets
        if: always()
        run: rm -f secrets.auto.tfvars
