# Mark clients that are exempt from basic auth.
# $remote_addr is the real client IP (X-Forwarded-For is trusted, see ../nginx/realip.conf).
# To exempt specific IPs/ranges from the challenge, add them here as `<addr> 1;`, e.g.:
#   203.0.113.7      1;   # a single office IP
#   198.51.100.0/24  1;   # a CIDR range
# With none listed, every client is challenged (per the per-URI rule below).
geo $auth_ip_exempt {
  default 0;
}

# Per-URI rule: the admin /api is always public (integrations/deploy tooling),
# everything else is behind basic auth. Anchored so only a real /api/ prefix matches
# (the old ~/api/* was unanchored — it matched any URI containing "/api"). store-api
# is deliberately left behind auth on staging.
map $request_uri $auth_uri {
  default "vanWittlaer Demo Site";
  ~^/api/ "off";
}

# Exempt IPs are never challenged; everyone else falls back to the per-URI rule.
map "$auth_ip_exempt:$auth_uri" $auth_type {
  "0:vanWittlaer Demo Site" "vanWittlaer Demo Site";
  default "off";
}
