
    # Serve a prohibitive robots.txt by default. This is a demo/reference deployment, so
    # NEITHER production nor staging should be indexed — every host falls through to
    # robots-blocker.txt (Disallow: / + AI crawlers, see public/robots-blocker.txt).
    # To allow indexing on a real shop, map that host to a permissive file, e.g.:
    #     shop.example.com robots-shop.txt;
    map $host $robots_file {
        default robots-blocker.txt;
    }
