# ===========================================================================
# HTTP basic-auth gating (host-based, single image for all environments).
#
# This config is ALWAYS baked into the image; whether a request is actually
# challenged is decided at request time by the maps below — no separate build
# stage, no env vars (the nginx image can't read them). The ONLY per-environment
# knob is the host list in $auth_host_gate: list the FQDN(s) that must sit behind
# the login (typically non-production storefronts). Everything else stays open.
#
# Operational contract: every host you switch "on" here MUST also have the
# .htpasswd bind-mounted at /var/www/auth/.htpasswd (infra: enable_basic_auth =
# true for that env). If the host is gated on but the file is missing, nginx
# returns 500 when the challenge fires. Hosts left "off" never open the file.
# ===========================================================================

# --- the per-environment knob ---------------------------------------------
# $host is the Host header; behind Coolify/Traefik that is the real public
# hostname (Traefik routes by it), so matching on $host is correct. Bare
# hostname only — no scheme/port. Add more lines to protect more hosts.
map $host $auth_host_gate {
  default                     "off";
  swoofy-staging.my-demo.shop "on";
}

# --- the admin API is always public ---------------------------------------
# Integrations/deploy tooling hit /api; everything else is eligible for the
# challenge. Anchored so only a real /api/ prefix matches (store-api stays
# behind auth on gated hosts).
map $request_uri $auth_uri_gate {
  default "on";
  ~^/api/ "off";
}

# --- optional IP exemption -------------------------------------------------
# $remote_addr is the real client IP (X-Forwarded-For is trusted, see realip.conf).
# Mark IPs/ranges that should never be challenged as `<addr> 1;`, e.g.:
#   203.0.113.7      1;   # a single office IP
#   198.51.100.0/24  1;   # a CIDR range
# With none listed, every client on a gated host is challenged.
geo $auth_ip_exempt {
  default 0;
}

# --- compose the gates -----------------------------------------------------
# Challenge (return the realm) only when: host is gated on AND path is not /api
# AND the client IP is not exempt. Any other combination => "off" (no auth).
map "$auth_host_gate:$auth_uri_gate:$auth_ip_exempt" $auth_type {
  default   "off";
  "on:on:0" "vanWittlaer Demo Site";
}
